name: Lint & Format Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-format:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # Biomeのセットアップと実行
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.8

      - name: Run Biome
        id: biome_check
        continue-on-error: true
        run: biome ci .

      # Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # 依存関係をインストール
      - name: Install dependencies
        run: |
          npm ci
          cd frontend/web && npm ci

      # E2Eテストのtype checking
      - name: Type check E2E tests
        id: e2e_typecheck
        continue-on-error: true
        run: |
          # E2Eテストの型チェック（frontend/web の tsconfig で Playwright E2E を含む範囲をチェック）
          cd frontend/web
          npx tsc --noEmit

      # Denoのセットアップ（Edge Functions用）
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6  # Supabase Edge Runtime互換バージョン

      # Denoの依存関係をキャッシュ
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      # Deno テスト依存関係の準備
      - name: Prepare Deno test dependencies
        run: |
          cd backend/supabase/test
          
          # Deno v2では新しい形式でロックファイルを生成
          echo "Caching test file dependencies..."
          for test_file in **/*.test.ts; do
            if [ -f "$test_file" ]; then
              deno cache --config=deno.json "$test_file" || echo "Warning: Failed to cache $test_file"
            fi
          done
          
          # 共有ヘルパーをキャッシュ
          echo "Caching shared modules..."
          for shared_file in shared/*.ts; do
            if [ -f "$shared_file" ]; then
              deno cache --config=deno.json "$shared_file" || echo "Warning: Failed to cache $shared_file"
            fi
          done

      # Edge Functionsの依存関係をキャッシュ
      - name: Cache Edge Functions dependencies
        run: |
          cd backend/supabase/functions
          
          # 共有モジュールの依存関係を先にキャッシュ
          if [ -d "_shared" ]; then
            echo "Caching shared modules..."
            for shared_file in _shared/*.ts; do
              if [ -f "$shared_file" ]; then
                deno cache --config=deno.json --reload "$shared_file" || echo "Warning: Failed to cache $shared_file"
              fi
            done
          fi
          
          # 各Edge Functionの依存関係をキャッシュ
          echo "Caching Edge Functions..."
          for func_dir in */; do
            func_name="${func_dir%/}"
            if [ -f "${func_dir}index.ts" ] && [ "$func_name" != "_shared" ]; then
              deno cache --config=deno.json --reload "${func_dir}index.ts" || echo "Warning: Failed to cache ${func_name}"
            fi
          done

      # Deno テストのlinting
      - name: Run Deno linting
        id: deno_lint
        continue-on-error: true
        run: |
          # テストファイルと共有ヘルパーをチェック
          cd backend/supabase/test
          deno lint **/*.test.ts
          cd shared
          deno lint *.ts
          # Edge Functionsのコードをチェック
          cd ../../functions
          find . -name "*.ts" | xargs -r deno lint

      # Deno type checkingの実行
      - name: Run Deno type checking
        id: deno_check
        continue-on-error: true
        run: |
          # テストファイルと共有ヘルパーをチェック
          cd backend/supabase/test
          deno check **/*.test.ts
          cd shared
          deno check deno-helpers.ts
          # Edge Functionsのコードをチェック
          cd ../../functions
          find . -name "*.ts" | xargs -r deno check

      # Flutter のセットアップ（mobile 用）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true

      # Flutter pub get
      - name: Flutter pub get
        run: |
          cd frontend/mobile
          flutter pub get

      # Flutter analyze
      - name: Run Flutter analyze
        id: flutter_analyze
        continue-on-error: true
        run: |
          cd frontend/mobile
          flutter analyze --no-fatal-infos

      # プロジェクト固有のルールチェック (SQL)
      - name: Run project SQL rule checks
        id: sql_rules
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check:rules:sql 2>&1 | tee sql-rules.log

      # プロジェクト固有のルールチェック (Code)
      - name: Run project Code rule checks
        id: code_rules
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check:rules:code 2>&1 | tee code-rules.log

      # プロジェクト固有のルールチェック (Zod Parity)
      - name: Run project Zod parity rule checks
        id: zod_parity_rules
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check:rules:zod 2>&1 | tee zod-parity.log

      # PR コメント通知（警告のみのケースを可視化）
      - name: Comment warnings on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- lint-warnings-bot -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            function parseWarnings(filePath) {
              if (!fs.existsSync(filePath)) return [];
              const content = fs.readFileSync(filePath, 'utf8');
              return content
                .split(/\r?\n/)
                .filter((l) => /:\s*warning:/.test(l));
            }

            const sqlWarnings = parseWarnings('sql-rules.log');
            const codeWarnings = parseWarnings('code-rules.log');
            const zodWarnings = parseWarnings('zod-parity.log');
            const total =
              sqlWarnings.length + codeWarnings.length + zodWarnings.length;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find(
              (c) => c.body && c.body.includes(MARKER),
            );

            if (total === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: existing.id,
                });
                core.info('Removed previous warning comment (no warnings now).');
              } else {
                core.info('No warnings detected.');
              }
              return;
            }

            const MAX_LINES = 50;
            const renderBlock = (title, items) => {
              if (items.length === 0) return '';
              const shown = items.slice(0, MAX_LINES);
              const extra = items.length > MAX_LINES
                ? `\n...(他 ${items.length - MAX_LINES} 件)`
                : '';
              return [
                `**${title} (${items.length} 件):**`,
                '```',
                ...shown,
                extra ? extra.replace(/^\n/, '') : null,
                '```',
                '',
              ].filter((x) => x !== null).join('\n');
            };

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              MARKER,
              '### ⚠️ 静的解析の警告',
              '',
              `合計 **${total}** 件の警告があります。push 自体はブロックされていませんが、規約遵守のため修正をご検討ください。`,
              '',
              renderBlock('SQL 規約', sqlWarnings),
              renderBlock('コード規約', codeWarnings),
              renderBlock('Zod スキーマ整合性 (Web ↔ Edge Function)', zodWarnings),
              `> 詳細は [Actions ログ](${runUrl}) をご確認ください。`,
            ].filter(Boolean).join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      # Lint結果サマリー
      - name: Lint Results Summary
        if: always()
        run: |
          echo "## Lint & Format Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 基本情報
          echo "### Run Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # チェック結果のステータス
          echo "### ✅ Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # 各ステップの結果サマリーを表示
          if [ "${{ steps.biome_check.outcome }}" == "success" ]; then
            echo "| 🔍 Biome Check (includes E2E) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Biome Check (includes E2E) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.e2e_typecheck.outcome }}" == "success" ]; then
            echo "| 🔧 E2E Type Checking | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔧 E2E Type Checking | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.deno_lint.outcome }}" == "success" ]; then
            echo "| 🔍 Deno Linting | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Deno Linting | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.deno_check.outcome }}" == "success" ]; then
            echo "| 🔧 Deno Type Checking | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔧 Deno Type Checking | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.flutter_analyze.outcome }}" == "success" ]; then
            echo "| 📱 Flutter Analyze | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📱 Flutter Analyze | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.sql_rules.outcome }}" == "success" ]; then
            echo "| 🗄️ SQL Rule Checks | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🗄️ SQL Rule Checks | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.code_rules.outcome }}" == "success" ]; then
            echo "| 📐 Code Rule Checks | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📐 Code Rule Checks | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.zod_parity_rules.outcome }}" == "success" ]; then
            echo "| 🔁 Zod Parity Checks | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔁 Zod Parity Checks | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # 全体の結果判定
          if [ "${{ steps.biome_check.outcome }}" == "success" ] && \
             [ "${{ steps.e2e_typecheck.outcome }}" == "success" ] && \
             [ "${{ steps.deno_lint.outcome }}" == "success" ] && \
             [ "${{ steps.deno_check.outcome }}" == "success" ] && \
             [ "${{ steps.flutter_analyze.outcome }}" == "success" ] && \
             [ "${{ steps.sql_rules.outcome }}" == "success" ] && \
             [ "${{ steps.code_rules.outcome }}" == "success" ] && \
             [ "${{ steps.zod_parity_rules.outcome }}" == "success" ]; then
            echo "### 🎉 All lint checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some lint checks failed" >> $GITHUB_STEP_SUMMARY
            echo "上記の失敗した項目を確認してください。" >> $GITHUB_STEP_SUMMARY
          fi

      # 全体のチェック結果を確認
      - name: Check overall lint status
        if: steps.biome_check.outcome != 'success' || steps.e2e_typecheck.outcome != 'success' || steps.deno_lint.outcome != 'success' || steps.deno_check.outcome != 'success' || steps.flutter_analyze.outcome != 'success' || steps.sql_rules.outcome != 'success' || steps.code_rules.outcome != 'success' || steps.zod_parity_rules.outcome != 'success'
        run: |
          echo "One or more lint checks failed. See summary for details."
          exit 1

