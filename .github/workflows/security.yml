name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # 毎週月曜 03:00 JST (= 日曜 18:00 UTC) に再スキャン
    # コード未変更でも新しく公開された CVE で再判定する目的
    - cron: '0 18 * * 0'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------
  # 1) シークレット検知 (Gitleaks)
  #    - PR / push 差分とリポジトリ全体をスキャン
  #    - gitleaks-action は org / private で有償ライセンスが必要なため
  #      CLI バイナリを直接インストールしてライセンス問題を回避
  # --------------------------------------------------------------------
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 履歴全体を遡ってシークレットを検出するため fetch-depth: 0
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks (full history)
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 14

  # --------------------------------------------------------------------
  # 2) 依存ライブラリ脆弱性検知 (Trivy)
  #    - 対象: frontend/web (npm), frontend/mobile (pub),
  #            backend/fastapi (pip), backend/supabase (deno)
  #    - DB はキャッシュせず毎回最新を取得 (CVE の最新性を優先)
  #    - SARIF を2種類生成:
  #      - trivy-{name}.sarif     : ignore-unfixed=true  (対応可能件数)
  #      - trivy-{name}-all.sarif : ignore-unfixed=false (全検知件数)
  # --------------------------------------------------------------------
  trivy:
    name: Dependency Scan (Trivy) - ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: web, path: frontend/web }
          - { name: mobile, path: frontend/mobile }
          - { name: fastapi, path: backend/fastapi }
          - { name: supabase, path: backend/supabase }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (対応可能 CVE のみ, SARIF)
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-${{ matrix.target.name }}.sarif
          exit-code: 0

      - name: Run Trivy (全 CVE を含む, SARIF)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          scanners: vuln
          format: sarif
          output: trivy-${{ matrix.target.name }}-all.sarif
          exit-code: 0

      - name: Run Trivy (table output for logs)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          format: table
          exit-code: 0

      - name: Upload Trivy report artifact (対応可能)
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.target.name)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.target.name }}-report
          path: trivy-${{ matrix.target.name }}.sarif
          retention-days: 14

      - name: Upload Trivy report artifact (全 CVE)
        if: always() && hashFiles(format('trivy-{0}-all.sarif', matrix.target.name)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.target.name }}-all-report
          path: trivy-${{ matrix.target.name }}-all.sarif
          retention-days: 14

  # --------------------------------------------------------------------
  # 3) SAST (Semgrep)
  #    - OSS ruleset (p/ci, p/typescript, p/react, p/nextjs, p/python, p/secrets)
  #    - SEMGREP_APP_TOKEN は使わずローカル ruleset で動作
  # --------------------------------------------------------------------
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          semgrep scan \
            --config p/ci \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/python \
            --config p/secrets \
            --severity ERROR \
            --severity WARNING \
            --sarif --output semgrep.sarif \
            --metrics=off \
            --exclude node_modules \
            --exclude .next \
            --exclude playwright-report \
            --exclude test-results \
            --exclude .test-results \
            --exclude .venv \
            --exclude build \
            --exclude '*.g.dart' \
            --exclude '*.freezed.dart'

      - name: Upload Semgrep report artifact
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          retention-days: 14

  # --------------------------------------------------------------------
  # 4) サマリ表示 & PR コメント
  #    - 各 SARIF を jq でパースして検知件数を集計
  #    - Trivy は「全検知件数」と「うち対応可能（修正版あり）」を分けて表示
  # --------------------------------------------------------------------
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy, semgrep]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download SARIF reports
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: sarif-reports

      - name: Count findings
        id: counts
        run: |
          count_sarif() {
            local f=$1
            [ -f "$f" ] && jq '[.runs[].results[]?] | length' "$f" 2>/dev/null || echo 0
          }

          gl=$(count_sarif "sarif-reports/gitleaks-report/gitleaks.sarif")

          tv_fix=0; tv_all=0
          for name in web mobile fastapi supabase; do
            n=$(count_sarif "sarif-reports/trivy-${name}-report/trivy-${name}.sarif")
            tv_fix=$((tv_fix + n))
            m=$(count_sarif "sarif-reports/trivy-${name}-all-report/trivy-${name}-all.sarif")
            tv_all=$((tv_all + m))
          done

          sg=$(count_sarif "sarif-reports/semgrep-report/semgrep.sarif")

          echo "gitleaks=$gl"      >> "$GITHUB_OUTPUT"
          echo "trivy_fix=$tv_fix" >> "$GITHUB_OUTPUT"
          echo "trivy_all=$tv_all" >> "$GITHUB_OUTPUT"
          echo "semgrep=$sg"       >> "$GITHUB_OUTPUT"

      - name: Write GitHub step summary
        env:
          GL:     ${{ steps.counts.outputs.gitleaks }}
          TV_FIX: ${{ steps.counts.outputs.trivy_fix }}
          TV_ALL: ${{ steps.counts.outputs.trivy_all }}
          SG:     ${{ steps.counts.outputs.semgrep }}
        run: |
          badge() {
            local n=${1:-0}
            [ "$n" -eq 0 ] && echo "✅ 0件" || echo "⚠️ ${n}件"
          }
          {
            echo "## 🔒 Security Scan Results"
            echo ""
            echo "| スキャン | 検知件数 | うち対応可能 |"
            echo "|---------|---------|------------|"
            echo "| Secret Scan (Gitleaks)    | $(badge ${GL:-0})     | -                      |"
            echo "| Dependency Scan (Trivy)   | $(badge ${TV_ALL:-0}) | $(badge ${TV_FIX:-0})  |"
            echo "| Static Analysis (Semgrep) | $(badge ${SG:-0})     | -                      |"
            echo ""
            echo "> **Trivy の「検知件数」は CRITICAL/HIGH の全 CVE 件数、「うち対応可能」は修正バージョンが存在する件数です。**"
            echo "> 詳細は各ジョブの Artifacts を確認してください。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MARKER = '<!-- security-scan-bot -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const gl    = parseInt('${{ steps.counts.outputs.gitleaks }}')  || 0;
            const tvFix = parseInt('${{ steps.counts.outputs.trivy_fix }}') || 0;
            const tvAll = parseInt('${{ steps.counts.outputs.trivy_all }}') || 0;
            const sg    = parseInt('${{ steps.counts.outputs.semgrep }}')   || 0;

            const badge = (n) => n === 0 ? `✅ ${n}件` : `⚠️ ${n}件`;

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;

            const body = [
              MARKER,
              '### 🔒 セキュリティスキャン結果',
              '',
              '| スキャン | 検知件数 | うち対応可能 |',
              '|---------|---------|------------|',
              `| Secret (Gitleaks)    | ${badge(gl)}    | -               |`,
              `| Dependency (Trivy)   | ${badge(tvAll)} | ${badge(tvFix)} |`,
              `| SAST (Semgrep)       | ${badge(sg)}    | -               |`,
              '',
              '> **Trivy の「検知件数」は CRITICAL/HIGH の全 CVE 件数、「うち対応可能」は修正バージョンが存在する件数です。**',
              '> 件数が 0 でも push / merge はブロックしません。詳細は Artifacts を確認してください。',
              '',
              `- 詳細ログ: [Actions Run](${runUrl})`,
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find(
              (c) => c.body && c.body.includes(MARKER),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
